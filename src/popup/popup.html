<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<link rel="stylesheet" href="popup.css" />
	<title>RecGrab</title>
</head>
<body>
	<header class="hdr">
		<div class="hdr-text">
			<h1>RecGrab</h1>
		</div>
		<div class="hdr-toggles">
			<label class="seg" id="enWrap" title="Master on/off for the whole extension">
				<input type="checkbox" id="gEnabled" />
				<span class="seg-label">On</span>
			</label>
			<label class="seg seg-danger" id="armWrap" title="Arm auto-grab (global)">
				<input type="checkbox" id="gArmed" />
				<span class="seg-label">Armed</span>
			</label>
		</div>
	</header>

	<!-- Empty / loading states -->
	<section id="stateMsg" class="state">
		<p id="stateText">Checking this page…</p>
		<button id="retryBtn" class="btn btn-secondary" hidden>Scan page</button>
	</section>

	<!-- Configurator (hidden until a scan succeeds) -->
	<main id="config" hidden>
		<section id="unsetBanner" class="block banner" hidden>
			<p class="banner-title">Set a group size to load availability</p>
			<p class="banner-sub">Recreation.gov hides all entry points until a group size is chosen.</p>
			<div class="row-inline">
				<div class="stepper" role="group" aria-label="Group size">
					<button id="bMinus" type="button" aria-label="Decrease">−</button>
					<input type="number" id="bGroupSize" min="1" inputmode="numeric" />
					<button id="bPlus" type="button" aria-label="Increase">+</button>
				</div>
				<button id="loadBtn" class="btn btn-secondary">Set &amp; load</button>
			</div>
			<button id="dumpLink" class="link" type="button">Group size won't set? Copy diagnostics</button>
		</section>

		<section class="block">
			<div class="block-head">
				<h2>Entry points</h2>
				<div class="mini-actions">
					<button id="selAll" class="link">All</button>
					<button id="selNone" class="link">None</button>
					<button id="selOpen" class="link">Open only</button>
				</div>
			</div>
			<input type="search" id="epSearch" class="search" placeholder="Filter entry points…" />
			<div id="epList" class="ep-list" role="group" aria-label="Entry points"></div>
		</section>

		<section class="block">
			<div class="booking-controls">
				<div class="booking-field">
					<span class="field-label">Group size</span>
					<div class="stepper" role="group" aria-label="Group size">
						<button id="gsMinus" type="button" aria-label="Decrease">−</button>
						<input type="number" id="groupSize" min="1" inputmode="numeric" />
						<button id="gsPlus" type="button" aria-label="Increase">+</button>
					</div>
				</div>
				<div class="booking-field booking-field-date">
					<span class="field-label">Target date</span>
					<div class="calendar-wrap" id="calendarWrap">
						<button id="dateTrigger" class="date-trigger" type="button" aria-expanded="false" aria-controls="calendarPanel">
							<span id="dateTriggerText">Pick a date</span>
							<span class="date-trigger-icon">▾</span>
						</button>
						<div id="calendarPanel" class="calendar-panel" hidden>
							<div class="calendar-head">
								<button id="calPrev" class="calendar-nav" type="button" aria-label="Previous month">‹</button>
								<strong id="calTitle"></strong>
								<button id="calNext" class="calendar-nav" type="button" aria-label="Next month">›</button>
							</div>
							<div class="calendar-weekdays" aria-hidden="true">
								<span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span>
							</div>
							<div id="calGrid" class="calendar-grid" role="grid" aria-label="Choose target date"></div>
						</div>
					</div>
				</div>
			</div>
		</section>

		<section class="block">
			<div class="block-head"><h2>Highlighting</h2></div>
			<label class="switch sm"><input type="checkbox" id="highlightMatches" /><span>Highlight open matches</span></label>
			<label class="switch sm"><input type="checkbox" id="hideNonMatchingRows" /><span>Hide unselected rows</span></label>
			<label class="switch sm"><input type="checkbox" id="hideRowsWithNoMatch" /><span>Hide selected rows with nothing open</span></label>
			<label class="switch sm"><input type="checkbox" id="dimUnavailable" /><span>Dim unavailable / not-released</span></label>
		</section>

	</main>

	<footer id="footer" class="footer" hidden>
		<button id="clearBtn" class="link danger-link">Clear all settings</button>
		<button id="saveBtn" class="btn btn-primary">Done</button>
	</footer>

	<script src="popup.js"></script>
</body>
</html>
